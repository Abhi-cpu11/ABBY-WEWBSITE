<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtVision - Basketball Analytics</title>
  <link href="style.css" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-icon">🏀</span> CourtVision</div>
      <div class="sub">
        Basketball analytics dashboard for team comparison and strategy recommendations.
      </div>

      <div class="nav">
        <button class="active" onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('comparison')">Comparison</button>
      </div>
    </aside>

    <main class="main">
      <section id="dashboardPage">
        <h1>Dashboard</h1>
        <div class="muted">Select two different teams to analyze the matchup.</div>

        <div id="matchupBar" class="matchup-bar hidden">
          <div>
            <div class="matchup-text">
              <span id="matchupTeamA">Select Team</span>
              <span class="vs-text">vs</span>
              <span id="matchupTeamB">Select Team</span>
            </div>
            <div id="matchupSub" class="matchup-subtext">Select a team to begin</div>
          </div>
          <button id="analyzeBtn" class="analyze-btn" onclick="goToComparison()" disabled>Analyze Matchup</button>
        </div>

        <div class="toolbar">
          <input id="teamSearch" class="search-input" type="text" placeholder="Search teams..." />
        </div>

        <div class="team-grid" id="teamGrid"></div>
      </section>

      <section id="comparisonPage" class="hidden">
        <h1>Matchup Analysis</h1>
        <div class="muted">Head-to-head comparison, radar chart, and game plan.</div>
        <div id="comparisonContent"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
